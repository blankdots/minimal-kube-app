name: Golang Tests

on:
  push:
    paths:
      - "**.go"
      - "**/go.*"
  pull_request:
    paths:
      - "**.go"
      - "**/go.*"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: Run tests
        run: go test -v -coverprofile=coverage.txt -covermode=atomic ./...
