{{- if .Values.cnpg.enabled }}
# Allow the app's service account to check if the CNPG-created secret exists (used by wait-db-secret init container)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kube-app.fullname" . }}-wait-db-secret
  labels:
    {{- include "kube-app.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ .Values.cnpg.auth.secretName | quote }}]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kube-app.fullname" . }}-wait-db-secret
  labels:
    {{- include "kube-app.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kube-app.fullname" . }}-wait-db-secret
subjects:
  - kind: ServiceAccount
    name: {{ include "kube-app.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
